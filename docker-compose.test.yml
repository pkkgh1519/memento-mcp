services:
  postgres-test:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB:       memento_test
      POSTGRES_USER:     memento
      POSTGRES_PASSWORD: memento_test
    ports:
      - "35433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memento -d memento_test"]
      interval: 2s
      timeout: 5s
      retries: 10
